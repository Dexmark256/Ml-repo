<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Just for you 😈</title>
<style>
body {
    background: radial-gradient(circle at top, #1e0033, #000);
    color: #f5f5f5;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #ff4dff;
    text-shadow: 0 0 15px #ff4dff;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    width: 85%;
    box-shadow: 0 0 20px rgba(255,77,255,0.3);
    transition: transform 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
}

button {
    background: linear-gradient(45deg, #ff4dff, #00ffff);
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
    margin: 5px;
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.15);
    box-shadow: 0 0 15px #00ffff;
}

img {
    width: 220px;
    border-radius: 20px;
    margin-top: 10px;
    box-shadow: 0 0 15px #ff4dff;
    transition: 0.3s;
}

img:hover {
    transform: scale(1.1) rotate(-2deg);
}

.progress {
    width: 80%;
    background: #333;
    border-radius: 20px;
    margin: 10px auto;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: linear-gradient(90deg, #ff4dff, #00ffff);
    border-radius: 20px;
    transition: width 0.5s;
}

.hidden { display: none; }

/* Correct/Wrong button styles */
.correct { background: #4caf50 !important; color: white; }
.wrong { background: #f44336 !important; color: white; }
</style>
</head>
<body>
<h1> Dont be bored 😏</h1>
<p>Let’s see how well you know me 👀</p>

<div class="card">
    <h2>look at the ki head</h2>
    <img src="https://files.catbox.moe/i6qwax.jpg" alt="Her Image">
</div>

<div class="card">
    <h2>Ok Laila, lets see if u know me 🎯</h2>
    <p id="question"></p>
    <div id="options"></div>
    <p id="result"></p>
    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
</div>

<div class="card hidden" id="finalCard">
    <h2>Final Result 😈</h2>
    <p id="finalText"></p>
</div>

<script>
let score = 0;
let step = 0;

const questions = [
    { q: "whats my name bby garl😁 ?", options: ["daddy 😏", "mr. nonchalant 😎", "mr.handsome 💀", "all 😂"], correct: 1 },
    { q: "if u know me wat are the common words i say?", options: ["Darling 😈", "stupid 🔥", "nonchalant 🤝", "f*ck you 🥵"], correct: 1 },
    { q: "whats my name 🫠?", options: ["Dante", "Danie 🗿", "Daniel", "mr. diih"], correct: 0 },
    { q: "What do i think u are ?", options: ["homegirl 😤", "girlfriend 😎", "chick 💀", " my love"], correct: 0 },
    { q: "what would i do if u disappeared?", options: ["cry 😂", "call you 😐", "thank God 🤣", "Nothing"], correct: 2 },
    { q: "what made me like u?", options: ["u funny🎭", "jus like u for u 🎬", "sex 💀", "i also dont know"], correct: 1 }
];

function loadQuestion() {
    document.getElementById("question").innerHTML = questions[step].q;
    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    questions[step].options.forEach((opt, index) => {
        let btn = document.createElement("button");
        btn.innerHTML = opt;
        btn.onclick = () => answer(index, btn);
        optionsDiv.appendChild(btn);
    });
}

function answer(choice, btn) {
    let result = document.getElementById("result");
    let bar = document.getElementById("bar");
    let buttons = document.querySelectorAll("#options button");

    // Disable all buttons
    buttons.forEach(b => b.disabled = true);

    if (choice === questions[step].correct) {
        score++;
        btn.classList.add("correct");
        result.innerHTML = "Correct 😂";
    } else {
        btn.classList.add("wrong");
        buttons[questions[step].correct].classList.add("correct"); // highlight correct
        result.innerHTML = `i dont know y u r stupid 😭 <br> Correct answer: <strong>${questions[step].options[questions[step].correct]}</strong>`;
    }

    step++;
    bar.style.width = ((step / questions.length) * 100) + "%";

    setTimeout(() => {
        result.innerHTML = "";
        if (step < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }, 2500);
}

function showFinal() {
    document.getElementById("finalCard").classList.remove("hidden");
    let text = "";
    if (score === questions.length) {
        text = "Damn 😳 you know everything!";
    } else if (score >= 3) {
        text = "Thats y i like u bby garl 😏";
    } else {
        text = "i didnt know u r this dumb";
    }
    document.getElementById("finalText").innerHTML = text;
}

loadQuestion();
</script>
</body>
  </html>
